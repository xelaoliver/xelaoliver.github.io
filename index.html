<!DOCTYPE html>
<head>
    <title>Worm</title>
</head>
<body>
    Alex Oliver, 2026
    <p>WORM, snake with <i>realistic</i> bodily movements, controlled with your mouse's scroll wheel. Reload this page upon your inevitable death and check out the source code to alter with the worm's biological factors.</p>
    <canvas id="canvas" width="640" height="480" style="border: 1px solid black;"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const rotateAmount = 2*(Math.PI/180); // change
        const speed = 2;
        const width = 10;
        const growth = 30;
        var pX = canvas.width/2;
        var pY = canvas.height/2;
        var pDir = 0;
        var tail = [];
        var length = 100;
        var targetLength = length;

        var fX = Math.floor(Math.random()*canvas.width);
        var fY = Math.floor(Math.random()*canvas.height);
		
		var left = false; var right = false;

        function body(a, b) {
            ctx.beginPath();
            let pW = 0;
            for (let i = 0; i < tail.length; i++) {
                let s = tail[i];

                let nX = a*Math.cos(s[2]);
                let nY = b*Math.sin(s[2]);

                if (i < width) {
                    pW = i;
                } else if (i > tail.length-width*3) {
                    let t = (tail.length-i)/(width*3);
                    pW = Math.max(t*width, 0);
                } else {
                    pW = width;
                }

                let x = s[0]+nX*pW;
                let y = s[1]+nY*pW;
                
                if (i == 0) { ctx.moveTo(x, y); } else { ctx.lineTo(x, y); }

                if (Math.sqrt(Math.pow(pX-x, 2)+Math.pow(pY-y, 2)) < width && i > width) {
                    ctx.closePath();

                    return 1;
                }
            }
            ctx.stroke();
            ctx.closePath();

            return 0;
        }

        function main() {
			if (left) { pDir += rotateAmount; }
			if (right) { pDir -= rotateAmount; }

            pX += speed*Math.sin(pDir);
            pY += speed*Math.cos(pDir);

            if (Math.sqrt(Math.pow(pX-fX, 2)+Math.pow(pY-fY, 2)) < width+2.5) {
                targetLength += growth;

                fX = Math.floor(Math.random()*canvas.width);
                fY = Math.floor(Math.random()*canvas.height);
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            tail.unshift([pX, pY, pDir]);
            if (tail.length > targetLength) {
                tail.pop();
            }

            if (body(1, -1) || body(-1, 1) || pX < 0 || pX > canvas.width || pY < 0 || pY > canvas.height) {
                alert(`Game over, your score was ${(targetLength-100)/growth}!`);
                clearInterval(game);
            }

            ctx.beginPath();
            ctx.arc(fX, fY, 5, 0, 2*Math.PI);
            ctx.stroke();
        }

		/*
        function rotate(event) {
            let a = event.deltaY*-rotateAmount;
            a = Math.max(-.075, Math.min(.075, a));
            pDir += a;
        }
		*/
		
		function handleKeyDown(e) {
    		if (e.key === "ArrowLeft") {
        		e.preventDefault();
        		left = true;
    		}
    		if (e.key === "ArrowRight") {
        		e.preventDefault();
        		right = true;
    		}
		}

		function handleKeyUp(e) {
    		if (e.key === "ArrowLeft") {
        		e.preventDefault();
        		left = false;
    		}
    		if (e.key === "ArrowRight") {
        		e.preventDefault();
        		right = false;
    		}
		}

		document.addEventListener("keydown", handleKeyDown);
 		document.addEventListener("keyup", handleKeyUp);

        const game = setInterval(function() {
            main()
        }, 1000/60);
    </script>
</body>
